body{font-family:'Poppins',sans-serif;background:#f5f5f5;color:#212121;min-height:100vh;display:flex;flex-direction:column}

.hdr img{height:36px}

.hdr-sec svg{width:15px;height:15px;flex-shrink:0}

.page{max-width:520px;margin:60px auto;padding:0 16px;flex:1;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}

.card{background:#fff;border-radius:16px;padding:48px 40px;box-shadow:0 2px 16px rgba(0,0,0,.07);text-align:center;width:100%}

.check-wrap{margin-bottom:24px}

.card .sub{font-size:14px;color:#555;line-height:1.65;margin-bottom:28px}
.card .sub strong{color:#1a2e22}

.pedido-id{background:#f5f5f5;border-radius:8px;padding:10px 18px;font-size:12px;color:#888;margin-bottom:28px;display:inline-block}
.pedido-id strong{color:#1a2e22;font-size:13px}

.btn-loja{display:inline-block;background:#15a731;color:#fff;text-decoration:none;padding:14px 32px;border-radius:10px;font-size:15px;font-weight:700;transition:background .15s}
.btn-loja:hover{background:#0e8a28}

.ftr{text-align:center;padding:24px;font-size:12px;color:#aaa}

<script>
